# Auto-translate documentation on push
# Generated by github-global

name: Auto Translate Docs

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/**/*.md'
      - 'docs/**/*.mdx'
      - '.github-global/glossary.yml'
      # NOTE: Translated output paths are deliberately excluded
      # to prevent infinite loops of auto-commit triggering this workflow.

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: github-global/action@v1
        with:
          provider: ${{ vars.GITHUB_GLOBAL_PROVIDER || 'deepseek' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(i18n): auto-translate [skip ci]"
          file_pattern: 'docs/** README.*.md .github-global/cache.json'
